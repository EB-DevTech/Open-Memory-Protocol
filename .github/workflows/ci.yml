name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ajv-cli
        run: npm install -g ajv-cli
      - name: Validate Example JSONs against Schemas
        run: |
          ajv validate -s spec/schemas/message.schema.json -d spec/examples/conversation.json --valid
          # More validations to be added as schemas mature

  test-connectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Connector Tests
        run: |
          echo "Placeholder for pytest when connectors are implemented"

  test-node-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Validator Tests
        run: |
          echo "Placeholder for jest tests when validator CLI is implemented"
